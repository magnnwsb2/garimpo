{% extends "base.html" %}

{% block title %}Login - Garimpo{% endblock %}

{% block content %}
<section class="page-header">
    <h2>Entrar</h2>
    <p>Acesse sua conta para visualizar seus currículos e matches.</p>
</section>

<main>
    <div class="card">
        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Entrar</button>
        </form>

        <p>Ainda não tem conta? <a href="/cadastro/">Criar conta</a></p>
    </div>
</main>
{% endblock %}
