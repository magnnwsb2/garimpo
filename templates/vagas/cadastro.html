{% extends "base.html" %}

{% block title %}Cadastro - Garimpo{% endblock %}

{% block content %}
<section class="page-header">
    <h2>Criar Conta</h2>
    <p>Crie uma conta para vincular seus currículos e resultados.</p>
</section>

<main>
    <div class="card">
        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit">Criar Conta</button>
        </form>

        <p>Já tem conta? <a href="/login/">Entrar</a></p>
    </div>
</main>
{% endblock %}
